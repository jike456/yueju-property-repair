spring.application.name=hello

# 可选：本地覆盖配置（复制 application-local.properties.example 为 application-local.properties，勿提交）
spring.config.import=optional:classpath:application-local.properties

# ================= 数据源配置（环境变量或 application-local.properties） =================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/yueju_property?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ================= MyBatis 配置 =================
mybatis.type-aliases-package=com.example.hello.entity
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.configuration.map-underscore-to-camel-case=true

pagehelper.helper-dialect=mysql
pagehelper.reasonable=true
pagehelper.support-methods-arguments=true
pagehelper.params=count=countSql

# ================= JWT 配置 =================
# 生产环境务必通过环境变量 YUEJU_JWT_SECRET 设置强随机密钥
yueju.jwt.secret=${YUEJU_JWT_SECRET:YueJuDevJwtSecretReplaceMeInProduction32CharsMin}
yueju.jwt.expire-seconds=86400

# ================= CORS 配置 =================
# cors.allowed-origins=https://your-frontend.com,http://localhost:5173

# ================= 文件上传配置 =================
file.upload.path=${FILE_UPLOAD_PATH:./uploads}
# file.upload.base-url=https://your-api-domain.com

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

spring.main.web-application-type=servlet
